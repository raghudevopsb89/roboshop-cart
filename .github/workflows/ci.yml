name: Cart CI Pipeline
run-name: Cart CI Pipeline
on: [push, workflow_dispatch]

jobs:
  lint:
    runs-on: self-hosted
    steps:
      - run: echo "npx eslint ."

  test:
    needs: lint
    runs-on: self-hosted
    steps:
      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."

  ci:
    needs: test
    uses: raghudevopsb89/github-actions/.github/workflows/ci.yml@main
    with:
      component_name: cart

