name: Cart CI Pipeline
run-name: Cart CI Pipeline
on: [push]

jobs:
  lint:
    runs-on: self-hosted
    steps:
      - run: echo "npx eslint ."

  build:
    needs: lint
    runs-on: self-hosted
    steps:
      - run: make docker-build

  test:
    needs: build
    runs-on: self-hosted
    steps:
      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."

  publish:
    needs: test
    runs-on: self-hosted
    steps:
      - run: make docker-push

